<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UIS Hackathon — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-hover: #243044;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f4f8;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-soft: rgba(59, 130, 246, 0.15);
      --radius: 20px;
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(59, 130, 246, 0.18), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(99, 102, 241, 0.12), transparent),
        var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #93c5fd;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 540px;
    }

    .apps {
      display: grid;
      gap: 16px;
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, transform 0.15s, border-color 0.15s;
    }

    .app-card:hover {
      background: var(--surface-hover);
      transform: translateY(-2px);
      border-color: rgba(59, 130, 246, 0.35);
    }

    .app-icon {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--accent-soft);
      font-size: 1.6rem;
    }

    .app-info h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .app-info p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .app-arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 1.25rem;
      transition: color 0.15s, transform 0.15s;
    }

    .app-card:hover .app-arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }

    footer a {
      color: #93c5fd;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="page">
    <span class="badge">GEMS United Indian School</span>
    <h1>UIS Hackathon</h1>
    <p class="subtitle">
      Welcome to my hackathon project hub. Explore the apps below — built for the UIS innovation challenge.
    </p>

    <section class="apps" aria-label="Project apps">
      <a class="app-card" href="calculator.html">
        <div class="app-icon" aria-hidden="true">🔢</div>
        <div class="app-info">
          <h2>Calculator</h2>
          <p>A modern web calculator with keyboard support, percent, and basic math operations.</p>
        </div>
        <span class="app-arrow" aria-hidden="true">→</span>
      </a>
    </section>

    <footer>
      Built by <a href="https://github.com/FARHANMOHAMMED-R" target="_blank" rel="noopener">Farhan Mohammed R</a>
      · <a href="https://github.com/FARHANMOHAMMED-R/UIS-Hackathon" target="_blank" rel="noopener">View on GitHub</a>
    </footer>
  </main>
</body>
</html>
