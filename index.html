<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator — UIS Hackathon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-hover: #243044;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f4f8;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --operator: #6366f1;
      --operator-hover: #4f46e5;
      --equals: #10b981;
      --equals-hover: #059669;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --radius: 20px;
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Inter', system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(59, 130, 246, 0.18), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(99, 102, 241, 0.12), transparent),
        var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .calculator {
      width: min(100%, 360px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 20px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header span {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .display {
      padding: 16px 24px 24px;
      text-align: right;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
    }

    .expression {
      font-size: 0.95rem;
      color: var(--muted);
      min-height: 1.4em;
      word-break: break-all;
    }

    .result {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      word-break: break-all;
      transition: color 0.15s;
    }

    .result.error {
      color: var(--danger);
      font-size: 1.6rem;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 0 16px 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 1.15rem;
      font-weight: 600;
      cursor: pointer;
      height: 64px;
      transition: background 0.15s, transform 0.1s;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    button:hover {
      background: var(--surface-hover);
    }

    button:active {
      transform: scale(0.96);
    }

    button.op {
      background: rgba(99, 102, 241, 0.25);
      color: #c7d2fe;
    }

    button.op:hover {
      background: var(--operator-hover);
      color: white;
    }

    button.fn {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      font-size: 1rem;
    }

    button.fn:hover {
      background: var(--danger-hover);
      color: white;
    }

    button.equals {
      background: var(--equals);
      color: white;
      grid-column: span 2;
    }

    button.equals:hover {
      background: var(--equals-hover);
    }

    button.zero {
      grid-column: span 2;
    }

    .footer {
      padding: 12px 24px 20px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="calculator" role="application" aria-label="Calculator">
    <div class="header">
      <h1>Calculator</h1>
      <span>UIS Hackathon</span>
    </div>

    <div class="display" aria-live="polite">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="keys">
      <button class="fn" data-action="clear" aria-label="Clear">AC</button>
      <button class="fn" data-action="toggle-sign" aria-label="Toggle sign">±</button>
      <button class="fn" data-action="percent" aria-label="Percent">%</button>
      <button class="op" data-action="operator" data-value="/" aria-label="Divide">÷</button>

      <button data-action="digit" data-value="7">7</button>
      <button data-action="digit" data-value="8">8</button>
      <button data-action="digit" data-value="9">9</button>
      <button class="op" data-action="operator" data-value="*" aria-label="Multiply">×</button>

      <button data-action="digit" data-value="4">4</button>
      <button data-action="digit" data-value="5">5</button>
      <button data-action="digit" data-value="6">6</button>
      <button class="op" data-action="operator" data-value="-" aria-label="Subtract">−</button>

      <button data-action="digit" data-value="1">1</button>
      <button data-action="digit" data-value="2">2</button>
      <button data-action="digit" data-value="3">3</button>
      <button class="op" data-action="operator" data-value="+" aria-label="Add">+</button>

      <button class="zero" data-action="digit" data-value="0">0</button>
      <button data-action="decimal" aria-label="Decimal">.</button>
      <button class="equals" data-action="equals" aria-label="Equals">=</button>
    </div>

    <div class="footer">Keyboard supported · Enter to calculate</div>
  </div>

  <script>
    const expressionEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');

    let current = '0';
    let previous = '';
    let operator = null;
    let resetOnNextDigit = false;

    function formatDisplay(value) {
      if (value === 'Error') return value;
      const num = Number(value);
      if (!Number.isFinite(num)) return 'Error';
      const str = String(num);
      if (str.length > 12) return num.toExponential(6);
      return str;
    }

    function updateDisplay() {
      resultEl.textContent = formatDisplay(current);
      resultEl.classList.toggle('error', current === 'Error');
      expressionEl.textContent = previous && operator
        ? `${formatDisplay(previous)} ${symbolFor(operator)}`
        : '';
    }

    function symbolFor(op) {
      return { '+': '+', '-': '−', '*': '×', '/': '÷' }[op] || op;
    }

    function inputDigit(digit) {
      if (current === 'Error') clearAll();
      if (resetOnNextDigit) {
        current = digit;
        resetOnNextDigit = false;
      } else {
        current = current === '0' ? digit : current + digit;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (current === 'Error') clearAll();
      if (resetOnNextDigit) {
        current = '0.';
        resetOnNextDigit = false;
      } else if (!current.includes('.')) {
        current += '.';
      }
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = '';
      operator = null;
      resetOnNextDigit = false;
      updateDisplay();
    }

    function toggleSign() {
      if (current === 'Error' || current === '0') return;
      current = String(Number(current) * -1);
      updateDisplay();
    }

    function applyPercent() {
      if (current === 'Error') return;
      current = String(Number(current) / 100);
      updateDisplay();
    }

    function calculate(a, b, op) {
      const x = Number(a);
      const y = Number(b);
      switch (op) {
        case '+': return x + y;
        case '-': return x - y;
        case '*': return x * y;
        case '/':
          if (y === 0) return 'Error';
          return x / y;
        default: return y;
      }
    }

    function chooseOperator(op) {
      if (current === 'Error') return;

      if (operator && !resetOnNextDigit) {
        const result = calculate(previous, current, operator);
        if (result === 'Error') {
          current = 'Error';
          previous = '';
          operator = null;
          updateDisplay();
          return;
        }
        current = String(result);
        previous = current;
      } else {
        previous = current;
      }

      operator = op;
      resetOnNextDigit = true;
      updateDisplay();
    }

    function evaluate() {
      if (!operator || current === 'Error') return;
      const result = calculate(previous, current, operator);
      expressionEl.textContent = `${formatDisplay(previous)} ${symbolFor(operator)} ${formatDisplay(current)} =`;
      current = String(result);
      previous = '';
      operator = null;
      resetOnNextDigit = true;
      updateDisplay();
    }

    document.querySelector('.keys').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;

      const action = btn.dataset.action;
      const value = btn.dataset.value;

      switch (action) {
        case 'digit': inputDigit(value); break;
        case 'decimal': inputDecimal(); break;
        case 'operator': chooseOperator(value); break;
        case 'equals': evaluate(); break;
        case 'clear': clearAll(); break;
        case 'toggle-sign': toggleSign(); break;
        case 'percent': applyPercent(); break;
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
      else if (e.key === '.') inputDecimal();
      else if (e.key === '+') chooseOperator('+');
      else if (e.key === '-') chooseOperator('-');
      else if (e.key === '*') chooseOperator('*');
      else if (e.key === '/') { e.preventDefault(); chooseOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') evaluate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current === 'Error' || resetOnNextDigit) return;
        current = current.length > 1 ? current.slice(0, -1) : '0';
        updateDisplay();
      }
    });

    updateDisplay();
  </script>
</body>
</html>
